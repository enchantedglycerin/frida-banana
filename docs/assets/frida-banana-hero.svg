<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">frida-banana</title>
  <desc id="desc">A banana-yellow banner for the frida-banana Android instrumentation project</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17131f"/>
      <stop offset="0.52" stop-color="#241a2f"/>
      <stop offset="1" stop-color="#352542"/>
    </linearGradient>
    <linearGradient id="peel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff176"/>
      <stop offset="0.48" stop-color="#ffd84d"/>
      <stop offset="1" stop-color="#ffb703"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd84d" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffd84d" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffd84d" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#09070c" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="30" fill="url(#dots)"/>
  <ellipse cx="910" cy="182" rx="270" ry="128" fill="#ffd84d" opacity="0.10" filter="url(#soft)"/>
  <rect x="66" y="300" width="700" height="2" fill="url(#glow)"/>

  <g opacity="0.28" stroke="#ffd84d" fill="none">
    <path d="M72 72h128"/>
    <path d="M72 72v38"/>
    <path d="M1128 288h-128"/>
    <path d="M1128 288v-38"/>
  </g>

  <g transform="translate(720 35) rotate(-4 210 140)" filter="url(#shadow)">
    <path d="M78 68c45 126 154 178 294 136 28-8 53-22 72-40-26 67-91 111-172 117C151 290 57 227 30 120 24 96 42 73 78 68Z" fill="url(#peel)"/>
    <path d="M76 72c40 102 143 151 265 122 35-8 68-23 93-43-29 41-78 69-136 77C188 243 98 189 60 103" fill="none" stroke="#fff7ae" stroke-width="12" stroke-linecap="round" opacity="0.62"/>
    <path d="M76 68c-7-22-3-37 12-47 13-8 30-7 45 1l-10 20c-12-5-21-3-28 6-5 6-6 14-4 23Z" fill="#78a641"/>
    <path d="M442 165c17-12 29-13 39-4 8 8 10 19 6 32l-18-4c2-8 0-14-5-17-6-4-12-3-20 2Z" fill="#6f8435"/>
    <circle cx="126" cy="116" r="5" fill="#7f5c17" opacity="0.45"/>
    <circle cx="172" cy="174" r="3.5" fill="#7f5c17" opacity="0.38"/>
    <circle cx="254" cy="214" r="4" fill="#7f5c17" opacity="0.34"/>
    <circle cx="344" cy="205" r="3" fill="#7f5c17" opacity="0.34"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="70" y="143" fill="#fff9db" font-size="66" font-weight="800" letter-spacing="-2">frida-banana</text>
    <text x="73" y="190" fill="#ffd84d" font-size="22" font-weight="700" letter-spacing="4">STEALTHY · REVIEWABLE · W^X</text>
    <text x="72" y="236" fill="#d8cfe2" font-size="20" font-weight="450">Frida 17.9.1 · Android arm64 · QuickJS</text>
    <g transform="translate(72 265)">
      <rect width="192" height="38" rx="19" fill="#ffd84d"/>
      <text x="96" y="25" text-anchor="middle" fill="#21172b" font-size="15" font-weight="800" letter-spacing="1">SOURCE-LEVEL FORK</text>
    </g>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="357" rx="28.5" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>
</svg>
